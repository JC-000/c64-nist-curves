# ld65 linker configuration for C64 PRG loading at $0801
# Produces identical output to the ACME -f cbm build
#
# Segment naming follows c64-lib-contract SPEC §4: every library code/rodata/
# data/bss segment is prefixed `LIB_NISTCURVES_*` with per-variant splits
# (P256 / P384 / SHA384 / MUL / MAIN). Consumer projects that vendor this
# library as a git submodule pick up the bytes by segment name from their
# own cfg's SEGMENTS{} block — zero source patches at integration.
#
# Standalone PRG build (this file) aliases every prefixed segment back to
# the single MAIN memory region so the library's own test PRG layout is
# preserved. The placement order below is chosen to keep the resulting
# nist-curves.prg byte-close to the pre-rename baseline: code segments in
# Makefile module link order, then RODATA, then page-aligned TABLES, then
# RW state.

FEATURES {
    STARTADDRESS: default = $0801;
}

SYMBOLS {
    __LOADADDR__: type = export, value = %S;
}

MEMORY {
    ZP:     file = "", start = $0002, size = $00FE, type = rw, define = yes;
    HEADER: file = %O, start = %S - 2, size = $0002, fill = yes;
    MAIN:   file = %O, start = %S, size = $D000 - %S;
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    LOADADDR: load = HEADER, type = ro;

    # --- Code tier (Makefile module link order) ---
    LIB_NISTCURVES_MAIN_CODE:     load = MAIN, type = rw;
    LIB_NISTCURVES_MUL_CODE:      load = MAIN, type = rw;
    LIB_NISTCURVES_P256_CODE:     load = MAIN, type = rw;
    LIB_NISTCURVES_P384_CODE:     load = MAIN, type = rw;
    LIB_NISTCURVES_SHA384_CODE:   load = MAIN, type = rw;

    # --- RODATA tier ---
    LIB_NISTCURVES_MAIN_RODATA:   load = MAIN, type = ro;
    LIB_NISTCURVES_P256_RODATA:   load = MAIN, type = ro;
    LIB_NISTCURVES_P384_RODATA:   load = MAIN, type = ro;
    LIB_NISTCURVES_SHA384_RODATA: load = MAIN, type = ro;

    # --- Page-aligned tables tier ---
    # SHA384 rotr LUTs + sha384_k MUST be page-aligned (lda lo_*_tbl,x
    # / ora hi_*_tbl,x must not page-cross). mul_dma_lo / mul_dma_hi
    # MUST be page-aligned (REU DMA target alignment + lda abs,Y
    # no-page-penalty).
    LIB_NISTCURVES_SHA384_TABLES: load = MAIN, type = ro,  align = $100;
    LIB_NISTCURVES_TABLES:        load = MAIN, type = rw,  align = $100;

    # --- RW state tier ---
    # Per-curve / per-feature BSS split (issue #40 / SPEC §6) lets minimal-
    # archive build targets exclude buffers their use case doesn't touch.
    # LIB_NISTCURVES_BSS is now the shared multiply scratch only
    # (mul_cached_a, mul_src2_buf); curve / SHA / test buffers each live
    # in their own segment. Placement order below matches the Makefile
    # MODULES link order for the data_* files so the standalone PRG stays
    # close to its pre-split byte layout.
    LIB_NISTCURVES_BSS:                load = MAIN, type = rw;
    LIB_NISTCURVES_P256_BSS:           load = MAIN, type = rw, optional = yes;
    LIB_NISTCURVES_P256_INVREF_BSS:    load = MAIN, type = rw, optional = yes;
    LIB_NISTCURVES_P256_LIMLEE_BSS:    load = MAIN, type = rw, optional = yes;
    LIB_NISTCURVES_P384_BSS:           load = MAIN, type = bss, optional = yes;
    LIB_NISTCURVES_P384_DATA_BSS:      load = MAIN, type = rw, optional = yes;
    LIB_NISTCURVES_P384_LIMLEE_BSS:    load = MAIN, type = rw, optional = yes;
    LIB_NISTCURVES_SHA384_BSS:         load = MAIN, type = rw, optional = yes;
    LIB_NISTCURVES_TEST_BSS:           load = MAIN, type = rw, optional = yes;
}
